/* ─── Reveal system ─── */
function useReveal(threshold = 0.12) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          el.classList.add("in");
        } else {
          // replay: remove class so it re-animates next time
          el.classList.remove("in");
        }
      },
      { threshold }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

// Generic reveal wrapper
function Reveal({ children, type = "reveal-up", delay = 0, style = {}, tag = "div" }) {
  const ref = useReveal(0.12);
  const Tag = tag;
  return (
    <Tag ref={ref} className={type} style={{ transitionDelay: `${delay}ms`, ...style }}>
      {children}
    </Tag>
  );
}

// Hero word-by-word reveal
function HeroWords({ text, serif = false, style = {} }) {
  const ref = useReveal(0.1);
  const words = text.split(" ");
  return (
    <span ref={ref} className="hero-words" style={{ display: "inline", ...style }}>
      {words.map((word, i) => (
        <span key={i} className="hero-word" style={{ transitionDelay: `${i * 60}ms`, fontFamily: serif ? "var(--font-serif)" : undefined, fontStyle: serif ? "italic" : undefined }}>
          {word}{i < words.length - 1 ? "\u00A0" : ""}
        </span>
      ))}
    </span>
  );
}

// Chip reveal: staggers each chip inside
function ChipReveal({ children, baseDelay = 0 }) {
  const ref = useReveal(0.1);
  return (
    <div ref={ref} className="chip-container" style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
      {React.Children.map(children, (child, i) =>
        React.cloneElement(child, {
          className: "reveal-chip " + (child.props.className || ""),
          style: { ...child.props.style, transitionDelay: `${baseDelay + i * 50}ms` }
        })
      )}
    </div>
  );
}

// Stagger container: adds .in to children via parent class + CSS sibling delays
function FadeIn({ children, delay = 0, style = {} }) {
  return <Reveal type="reveal-up" delay={delay} style={style}>{children}</Reveal>;
}

/* ─── Projects ─── */
function ProjectCard({ project, tweaks, idx }) {
  const [hovered, setHovered] = useState(false);
  const accent = tweaks.accentColor === "blue" ? "var(--blue)" : tweaks.accentColor === "green" ? "oklch(52% 0.18 150)" : "oklch(55% 0.2 30)";
  const elevated = tweaks.cardStyle === "elevated";

  return (
    <Reveal type="reveal-scale" delay={idx * 120}>
      <a href={project.url} target="_blank" rel="noopener"
        style={{ textDecoration: "none", display: "block" }}
        onMouseEnter={() => setHovered(true)}
        onMouseLeave={() => setHovered(false)}>
        <div style={{
          borderRadius: 16,
          border: "1px solid var(--border)",
          background: hovered ? "var(--bg2)" : "white",
          overflow: "hidden",
          transition: "all 0.25s ease",
          boxShadow: elevated ? (hovered ? "0 20px 60px rgba(0,0,0,0.10)" : "0 2px 12px rgba(0,0,0,0.05)") : "none",
          transform: hovered ? "translateY(-3px)" : "translateY(0)",
        }}>
          {/* Banner */}
          <div style={{
            height: 180, background: `linear-gradient(135deg, ${project.accent} 0%, ${project.accent}cc 100%)`,
            display: "flex", alignItems: "center", justifyContent: "center",
            position: "relative", overflow: "hidden",
          }}>
            {/* Decorative circles */}
            <div style={{ position: "absolute", width: 200, height: 200, borderRadius: "50%", background: "rgba(255,255,255,0.04)", top: -60, right: -40 }}></div>
            <div style={{ position: "absolute", width: 120, height: 120, borderRadius: "50%", background: "rgba(255,255,255,0.06)", bottom: -30, left: 40 }}></div>
            {/* Tag */}
            <div style={{ position: "absolute", top: 16, left: 16, padding: "4px 12px", borderRadius: 99, background: "rgba(255,255,255,0.12)", fontSize: 12, color: "rgba(255,255,255,0.8)", fontWeight: 500, backdropFilter: "blur(8px)" }}>
              {project.type}
            </div>
            {/* Arrow */}
            <div style={{ position: "absolute", top: 16, right: 16, width: 32, height: 32, borderRadius: "50%", background: "rgba(255,255,255,0.12)", display: "flex", alignItems: "center", justifyContent: "center", transition: "transform 0.2s", transform: hovered ? "translate(2px,-2px)" : "none" }}>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M3 11L11 3M11 3H5M11 3V9" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </div>
            {/* Name */}
            <span style={{ fontFamily: "var(--font-serif)", fontStyle: "italic", fontSize: 28, color: "white", fontWeight: 400, letterSpacing: "-0.01em" }}>
              {project.name}
            </span>
          </div>

          {/* Body */}
          <div style={{ padding: "24px 28px 28px" }}>
            <p style={{ fontSize: 15, color: "var(--text-muted)", lineHeight: 1.65, marginBottom: 20 }}>
              {project.desc}
            </p>
            {/* Stack bar */}
            <div style={{ display: "flex", height: 4, borderRadius: 99, overflow: "hidden", gap: 2, marginBottom: 16 }}>
              {project.stack.map(s => (
                <div key={s.label} style={{ flex: s.pct, background: s.color, opacity: 0.85 }}></div>
              ))}
            </div>
            <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
              {project.stack.map(s => (
                <div key={s.label} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12.5, color: "var(--text-muted)" }}>

}

function Projects({ tweaks }) {
