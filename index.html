    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {

      --border: #E4E4E0;

      color: var(--text);

    :root {

    .reveal-up { opacity: 0; transform: translateY(32px); transition: opacity 0.65s var(--ease-out), transform 0.65s var(--ease-out); }

    /* fade only */

    .reveal-fade.in { opacity: 1; }

    .reveal-left.in { opacity: 1; transform: translateX(0); }

/* ─── Reveal system ─── */
function useReveal(threshold = 0.12) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          el.classList.add("in");
        } else {
          // replay: remove class so it re-animates next time
          el.classList.remove("in");
        }
      },
      { threshold }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

// Generic reveal wrapper
function Reveal({ children, type = "reveal-up", delay = 0, style = {}, tag = "div" }) {
  const ref = useReveal(0.12);
  const Tag = tag;
  return (
    <Tag ref={ref} className={type} style={{ transitionDelay: `${delay}ms`, ...style }}>
      {children}
    </Tag>
  );
}

// Hero word-by-word reveal
function HeroWords({ text, serif = false, style = {} }) {
  const ref = useReveal(0.1);
  const words = text.split(" ");
  return (
    <span ref={ref} className="hero-words" style={{ display: "inline", ...style }}>
      {words.map((word, i) => (
        <span key={i} className="hero-word" style={{ transitionDelay: `${i * 60}ms`, fontFamily: serif ? "var(--font-serif)" : undefined, fontStyle: serif ? "italic" : undefined }}>
          {word}{i < words.length - 1 ? "\u00A0" : ""}
        </span>
      ))}
    </span>
  );
}

// Chip reveal: staggers each chip inside
function ChipReveal({ children, baseDelay = 0 }) {
  const ref = useReveal(0.1);
  return (
    <div ref={ref} className="chip-container" style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
      {React.Children.map(children, (child, i) =>
        React.cloneElement(child, {
          className: "reveal-chip " + (child.props.className || ""),
          style: { ...child.props.style, transitionDelay: `${baseDelay + i * 50}ms` }
        })
      )}
    </div>
  );
}

// Stagger container: adds .in to children via parent class + CSS sibling delays
function FadeIn({ children, delay = 0, style = {} }) {
  return <Reveal type="reveal-up" delay={delay} style={style}>{children}</Reveal>;

/* ─── Snap project item ─── */
function ProjSnapItem({ project, index, active, scrollRef, accent, onActive }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  const onActiveRef = useRef(onActive);
  useEffect(() => { onActiveRef.current = onActive; });

  useEffect(() => {
    const el = ref.current;
    const container = scrollRef.current;
    if (!el || !container) return;
    const visObs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setVisible(true); visObs.disconnect(); } },
      { root: container, threshold: 0.05 }
    );
    const activeObs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) onActiveRef.current(index); },
      { root: container, rootMargin: "-35% 0px -35% 0px", threshold: 0 }
    );
    visObs.observe(el); activeObs.observe(el);
    return () => { visObs.disconnect(); activeObs.disconnect(); };
  }, [scrollRef]);

  const titleCase = s => s.replace(/\b\w/g, c => c.toUpperCase());
  const cap = s => s ? s.charAt(0).toUpperCase() + s.slice(1) : "";

  return (
    <div
      ref={ref}
      className={`snap-item${visible ? " in" : ""}`}
      style={{
        scrollSnapAlign: "center",
        minHeight: "clamp(120px, 28vh, 240px)",
        display: "flex", alignItems: "center",
        padding: "20px 48px 20px 20px",
      }}
    >
      {/* Dot on the line (line is at left:4, dot center needs to be at 4px from scroll area) */}
      <div style={{
        width: 9, height: 9, borderRadius: "50%", flexShrink: 0,
        background: active ? accent : "white",
        border: `2px solid ${active ? accent : "var(--border)"}`,
        boxShadow: `0 0 0 4px var(--bg)${active ? `, 0 0 0 7px ${accent}22` : ""}`,
        marginLeft: -0.5, marginRight: 28, position: "relative", zIndex: 2,
        transition: "background 0.3s, border-color 0.3s, box-shadow 0.3s",
      }} />
      {/* Content */}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 14, marginBottom: 7 }}>
          <h3 style={{
            fontSize: "clamp(16px, 2.4vw, 20px)", fontWeight: 600,
            letterSpacing: "-0.02em", margin: 0, lineHeight: 1.2,
            color: active ? "var(--text)" : "var(--text-muted)",
            opacity: active ? 1 : 0.5,
            transition: "color 0.3s, opacity 0.3s",
          }}>
            {titleCase(project.name)}
          </h3>
          {project.type && (
            <span style={{
              fontSize: 10.5, fontWeight: 500, padding: "2px 8px", borderRadius: 99,
              background: "var(--bg2)", color: "var(--text-muted)",
              border: "1px solid var(--border)", flexShrink: 0, marginTop: 3,
              opacity: active ? 0.9 : 0.3, transition: "opacity 0.3s",
            }}>
              {project.type}
            </span>
          )}
        </div>
        {project.desc && (
          <p style={{
            fontSize: "clamp(12.5px, 1.7vw, 14px)",
            color: "var(--text-muted)", lineHeight: 1.65, margin: 0,
            marginBottom: active && project.url ? 11 : 0,
            opacity: active ? 0.78 : 0.28, transition: "opacity 0.3s",
          }}>
            {cap(project.desc)}
          </p>
        )}
        {project.url && (
          <div style={{ overflow: "hidden", height: active ? 20 : 0, transition: "height 0.28s var(--ease-out)" }}>
            <a href={project.url} target="_blank" rel="noopener" style={{
              display: "inline-flex", alignItems: "center", gap: 4,
              fontSize: 12.5, fontWeight: 500, color: accent, textDecoration: "none",
            }}
            onMouseEnter={e => e.currentTarget.style.opacity = "0.65"}
            onMouseLeave={e => e.currentTarget.style.opacity = "1"}>
              Visit
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
                <path d="M2 8L8 2M8 2H3.5M8 2V6.5" stroke="currentColor" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </a>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── All Projects Panel ─── */
function AllProjectsPanel({ onClose, accent }) {
  const [projects, setProjects] = useState(_projectCache);
  const [loading, setLoading] = useState(!_projectCache && !_projectError);
  const [fetchErr, setFetchErr] = useState(_projectError);
  const [closing, setClosing] = useState(false);
  const [activeIndex, setActiveIndex] = useState(0);
  const [activeDate, setActiveDate] = useState(_projectCache ? _projectCache[0].date : "");
  const [dateFading, setDateFading] = useState(false);
  const scrollRef = useRef(null);
  const dateTimerRef = useRef(null);

  useEffect(() => {
    document.body.style.overflow = "hidden";
    return () => { document.body.style.overflow = ""; };
  }, []);

  useEffect(() => {
    const fn = e => { if (e.key === "Escape") handleClose(); };
    window.addEventListener("keydown", fn);
    return () => window.removeEventListener("keydown", fn);
  }, []);

  useEffect(() => {
    if (_projectCache) { setProjects(_projectCache); setLoading(false); return; }
    if (_projectError) { setFetchErr(true); setLoading(false); return; }
    _projectFetch.then(() => {
      if (_projectCache) { setProjects(_projectCache); setActiveDate(_projectCache[0].date); }
      else setFetchErr(true);
      setLoading(false);
    }).catch(() => { setFetchErr(true); setLoading(false); });
  }, []);

  const handleClose = () => { setClosing(true); setTimeout(onClose, 310); };

  const fmt = s => {
    if (!s) return ["", ""];
    const [d, m, y] = s.split("/");
    const date = new Date(+y, +m - 1, +d);
    return [
      date.toLocaleDateString("en-NZ", { month: "short" }).toUpperCase(),
      date.getFullYear().toString(),
    ];
  };

  const handleActiveItem = index => {
    if (!projects) return;
    const newDate = projects[index]?.date ?? "";
    setActiveIndex(index);
    clearTimeout(dateTimerRef.current);
    setDateFading(true);
    dateTimerRef.current = setTimeout(() => { setActiveDate(newDate); setDateFading(false); }, 160);
  };

  const [month, year] = fmt(activeDate);

  return (
    <div style={{
      position: "fixed", top: 60, left: 0, right: 0, bottom: 0,
      zIndex: 150, background: "var(--bg)",
      display: "flex", flexDirection: "column",
      animation: `${closing ? "panel-out" : "panel-in"} 0.32s var(--ease-out) both`,
    }}>
      {/* Header */}
      <div style={{
        height: 52, flexShrink: 0,
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "0 clamp(16px, 4vw, 32px)",
        borderBottom: "1px solid var(--border)",
      }}>
        <span style={{ fontSize: 11.5, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--text-muted)" }}>
          {loading ? "Loading…" : projects ? `${projects.length} Projects` : "All work"}
        </span>
        <button onClick={handleClose} style={{
          display: "inline-flex", alignItems: "center", gap: 6,
          padding: "6px 14px", borderRadius: 99,
          border: "1px solid var(--border)", background: "transparent",
          cursor: "pointer", fontSize: 13, fontWeight: 500, color: "var(--text-muted)",
          transition: "background 0.15s, border-color 0.15s",
        }}
        onMouseEnter={e => { e.currentTarget.style.background = "var(--bg2)"; e.currentTarget.style.borderColor = "#ccc"; }}
        onMouseLeave={e => { e.currentTarget.style.background = "transparent"; e.currentTarget.style.borderColor = "var(--border)"; }}>
          Close
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
          </svg>
        </button>
      </div>

      {/* Body */}
      <div style={{ flex: 1, display: "flex", overflow: "hidden", position: "relative" }}>
        {/* Left date column — desktop only, hidden via CSS on mobile */}
        <div className="panel-date-left" style={{
          width: "clamp(72px, 14vw, 144px)", flexShrink: 0,
          display: "flex", alignItems: "center", justifyContent: "flex-end",
          padding: "0 20px 0 12px", userSelect: "none",
        }}>
          <div style={{
            textAlign: "right",
            opacity: dateFading ? 0 : 1,
            transform: dateFading ? "translateY(-6px)" : "translateY(0)",
            transition: "opacity 0.16s ease, transform 0.16s ease",
          }}>
            <div style={{ fontSize: "clamp(9px, 1.3vw, 11px)", fontWeight: 700, letterSpacing: "0.12em", color: "var(--text-muted)", lineHeight: 1.2 }}>{month}</div>
            <div style={{ fontSize: "clamp(18px, 2.8vw, 26px)", fontWeight: 600, letterSpacing: "-0.03em", color: "var(--text)", lineHeight: 1.1, marginTop: 1 }}>{year}</div>
          </div>
        </div>

        {/* Date overlay — mobile only, shown via CSS */}
        <div className="panel-date-overlay" style={{
          position: "absolute", top: 18, right: 16,
          zIndex: 5, pointerEvents: "none", userSelect: "none", textAlign: "right",
        }}>
          <div style={{
            opacity: dateFading ? 0 : 1,
            transform: dateFading ? "translateY(-6px)" : "translateY(0)",
            transition: "opacity 0.16s ease, transform 0.16s ease",
          }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.12em", color: "var(--text-muted)", lineHeight: 1.2, textTransform: "uppercase" }}>{month}</div>
            <div style={{ fontSize: 24, fontWeight: 600, letterSpacing: "-0.03em", color: "var(--text)", lineHeight: 1.1, marginTop: 2 }}>{year}</div>
          </div>
        </div>

        {/* Scrollable snap area */}
        <div
          ref={scrollRef}
          style={{
            flex: 1, overflowY: "scroll",
            scrollSnapType: "y proximity",
            WebkitOverflowScrolling: "touch",
            position: "relative",
            padding: "0 clamp(24px, 4vw, 64px)",
          }}
        >
          {loading && (
            <div style={{ height: "100%", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--text-muted)", fontSize: 14 }}>
              Loading…
            </div>
          )}
          {fetchErr && (
            <div style={{ height: "100%", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--text-muted)", fontSize: 14 }}>
              Couldn't load.{" "}<a href="https://rossi.nz" target="_blank" rel="noopener" style={{ color: accent }}>Visit rossi.nz</a>
            </div>
          )}
          {projects && (
            <div style={{ paddingTop: "calc(50vh - 116px)", paddingBottom: "calc(50vh - 116px)", position: "relative", maxWidth: 640, margin: "0 auto" }}>
              {/* Line inside content container so it spans full scroll height, left:24 aligns with dot centers */}
              <div style={{
                position: "absolute", left: 24, top: 0, bottom: 0,
                width: 1, background: "var(--border)", pointerEvents: "none", zIndex: 0,
              }} />
              {projects.map((p, i) => (
                <ProjSnapItem key={i} project={p} index={i} active={i === activeIndex} scrollRef={scrollRef} accent={accent} onActive={handleActiveItem} />
              ))}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

        <div style={{ marginTop: 24, padding: "20px 28px", borderRadius: "var(--radius)", background: accentLight, border: `1px solid ${accent}22`, display: "flex", gap: 16, alignItems: "flex-start" }}>
          <div style={{ width: 8, height: 8, borderRadius: "50%", background: accent, flexShrink: 0, marginTop: 6 }}></div>
          <div>
            <div style={{ fontSize: 14, fontWeight: 600, color: accent, marginBottom: 4 }}>Currently learning</div>
            <div style={{ fontSize: 14, color: "var(--text-muted)" }}>React, Node.js, and TypeScript — building toward full-stack fluency while maintaining a desktop-first approach with Tauri.</div>
          </div>
        </div>
      </Reveal>
    </section>
  );
}

/* ─── Timeline / Experience ─── */
function Timeline({ tweaks }) {
  const accent = tweaks.accentColor === "blue" ? "var(--blue)" : tweaks.accentColor === "green" ? "oklch(52% 0.18 150)" : "oklch(55% 0.2 30)";

  const items = [
    { year: "Now", title: "Catalyst — in development", org: "Desktop App", desc: "Building a Tauri-powered video downloader wrapping yt-dlp. Alpha versions available. Actively developing new features." },
    { year: "Nov 2025", title: "Spotify Fullscreen Mode", org: "Chrome Extension", desc: "Published a Chrome extension that surfaces a beautiful fullscreen music interface. First publicly shipped product." },
    { year: "Jun 2025", title: "monsterprod.fr", org: "Website", desc: "Built the full site for monsterprod.fr — hand-crafted HTML, CSS and JavaScript, no frameworks." },
    { year: "Mar 2025", title: "ShortLink", org: "Website", desc: "Built a simple URL shortening service with a clean, modern interface." },
    { year: "July 2023", title: "Two years in France", org: "French immersion", desc: "Left New Zealand in July 2023, returned September 2025. Became fully fluent in French while continuing to code and shoot photography." },
    { year: "2023", title: "First real projects", org: "JS + Python", desc: "Started building proper web apps — JavaScript frontends backed by Python servers. Things started clicking." },
    { year: "2020", title: "Started coding", org: "Python → HTML & CSS", desc: "Picked up Python at age 10, then quickly moved into HTML and CSS. Fell in love with building things on a screen." },
  ];

  return (
    <section id="experience" style={{ padding: "80px 32px", maxWidth: 780, margin: "0 auto" }}>
      <Reveal type="reveal-up">
        <div className="section-header-mb" style={{ marginBottom: 40 }}>
          <div style={{ fontSize: 12, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--text-muted)", marginBottom: 12 }}>Journey</div>
          <h2 style={{ fontSize: "clamp(20px, 4.5vw, 40px)", fontWeight: 600, letterSpacing: "-0.025em" }}>
            Timeline
          </h2>
        </div>
      </Reveal>
      <div style={{ position: "relative" }}>
        {/* Vertical line */}
        <div className="tl-line" style={{ position: "absolute", left: 84, top: 0, bottom: 0, width: 1, background: "var(--border)" }}></div>
        <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
          {items.map((item, i) => (
            <Reveal key={i} type="reveal-left" delay={i * 90}>
              <div style={{ display: "flex", gap: 0, paddingBottom: 40 }}>
                {/* Year column */}
                <div className="tl-year" style={{ width: 80, flexShrink: 0, paddingRight: 16 }}>
                  <div style={{ fontSize: 12.5, fontWeight: 500, color: "var(--text-muted)", paddingTop: 3, textAlign: "right", lineHeight: 1.4 }}>{item.year}</div>
                </div>
                {/* Dot */}
                <div className="tl-dot-wrap" style={{ position: "relative", flexShrink: 0, marginRight: 24 }}>
                  <div style={{ width: 10, height: 10, borderRadius: "50%", background: i === 0 ? accent : "var(--border)", border: `2px solid ${i === 0 ? accent : "var(--border)"}`, marginTop: 4, boxShadow: i === 0 ? `0 0 0 4px ${accent}22` : "none" }}></div>
                </div>
                {/* Content */}
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 11.5, fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase", color: "var(--text-muted)", marginBottom: 4 }}>{item.org}</div>
                  <div style={{ fontSize: "clamp(14px, 3.5vw, 16px)", fontWeight: 600, color: "var(--text)", marginBottom: 6 }}>{item.title}</div>
                  <div style={{ fontSize: "clamp(13px, 3vw, 14.5px)", color: "var(--text-muted)", lineHeight: 1.65 }}>{item.desc}</div>
                </div>
              </div>
            </Reveal>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ─── Contact ─── */
function Contact({ tweaks }) {
  const accent = tweaks.accentColor === "blue" ? "var(--blue)" : tweaks.accentColor === "green" ? "oklch(52% 0.18 150)" : "oklch(55% 0.2 30)";

          <p style={{ fontSize: "clamp(14px, 3.5vw, 17px)", color: "var(--text-muted)", maxWidth: 460, lineHeight: 1.65 }}>

        </div>

      <div style={{ marginTop: 48, display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 12 }}>

          <Reveal key={l.label} type="reveal-spring" delay={i * 80}>

/* ─── App ─── */
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <div style={{ minHeight: "100vh", background: "var(--bg)" }}>
      <Nav tweaks={tweaks} />
      <main style={{ maxWidth: 1100, margin: "0 auto" }}>
        <Hero tweaks={tweaks} />
        <Projects tweaks={tweaks} />
        <Skills tweaks={tweaks} />
        <Timeline tweaks={tweaks} />
        <Contact tweaks={tweaks} />
      </main>

      <TweaksPanel>
        <TweakSection label="Accent Color">
          <TweakRadio id="accentColor" options={["blue", "green", "orange"]} value={tweaks.accentColor} onChange={v => setTweak("accentColor", v)} />

          <TweakRadio id="cardStyle" options={["elevated", "flat"]} value={tweaks.cardStyle} onChange={v => setTweak("cardStyle", v)} />

    </div>
  );
}
