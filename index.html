/* ─── Reveal system ─── */
function useReveal(threshold = 0.12) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => {
        if (entry.isIntersecting) {
          el.classList.add("in");
        } else {
          // replay: remove class so it re-animates next time
          el.classList.remove("in");
        }
      },
      { threshold }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

// Generic reveal wrapper
function Reveal({ children, type = "reveal-up", delay = 0, style = {}, tag = "div" }) {
  const ref = useReveal(0.12);
  const Tag = tag;
  return (
    <Tag ref={ref} className={type} style={{ transitionDelay: `${delay}ms`, ...style }}>
      {children}
    </Tag>
  );
}

// Hero word-by-word reveal
function HeroWords({ text, serif = false, style = {} }) {
  const ref = useReveal(0.1);
  const words = text.split(" ");
  return (
    <span ref={ref} className="hero-words" style={{ display: "inline", ...style }}>
      {words.map((word, i) => (
        <span key={i} className="hero-word" style={{ transitionDelay: `${i * 60}ms`, fontFamily: serif ? "var(--font-serif)" : undefined, fontStyle: serif ? "italic" : undefined }}>
          {word}{i < words.length - 1 ? "\u00A0" : ""}
        </span>
      ))}
    </span>
  );
}

// Chip reveal: staggers each chip inside
function ChipReveal({ children, baseDelay = 0 }) {
  const ref = useReveal(0.1);
  return (
    <div ref={ref} className="chip-container" style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
      {React.Children.map(children, (child, i) =>
        React.cloneElement(child, {
          className: "reveal-chip " + (child.props.className || ""),
          style: { ...child.props.style, transitionDelay: `${baseDelay + i * 50}ms` }
        })
      )}
    </div>
  );
}

// Stagger container: adds .in to children via parent class + CSS sibling delays
function FadeIn({ children, delay = 0, style = {} }) {
  return <Reveal type="reveal-up" delay={delay} style={style}>{children}</Reveal>;
}

    >
      {SKILL_ICONS[item] && (
        <span style={{ width: 18, height: 18, flexShrink: 0, display: "inline-flex" }}
          dangerouslySetInnerHTML={{ __html: SKILL_ICONS[item] }} />
      )}
      {item}
      {tooltip && (
        <div style={{
          position: "absolute",
          bottom: "calc(100% + 10px)",
          left: "50%",
          transform: `translateX(-50%) translateY(${hovered ? 0 : 5}px)`,
          background: "#111110",
          color: "rgba(255,255,255,0.88)",
          fontSize: 12,
          fontWeight: 400,
          lineHeight: 1.55,
          padding: "7px 11px",
          borderRadius: 8,
          width: 200,
          textAlign: "center",
          pointerEvents: "none",
          zIndex: 20,
          boxShadow: "0 6px 20px rgba(0,0,0,0.22)",
          opacity: hovered ? 1 : 0,
          transition: "opacity 0.15s ease, transform 0.15s ease",
        }}>
          {tooltip}
          <div style={{
            position: "absolute",
            top: "100%",
            left: "50%",
            transform: "translateX(-50%)",
            borderLeft: "5px solid transparent",
            borderRight: "5px solid transparent",
            borderTop: "5px solid #111110",
          }} />
        </div>
      )}
    </span>
  );
}

/* ─── Skills ─── */
function Skills({ tweaks }) {
  const accent = tweaks.accentColor === "blue" ? "var(--blue)" : tweaks.accentColor === "green" ? "oklch(52% 0.18 150)" : "oklch(55% 0.2 30)";
  const accentLight = tweaks.accentColor === "blue" ? "var(--blue-light)" : tweaks.accentColor === "green" ? "oklch(94% 0.06 150)" : "oklch(95% 0.05 30)";

  return (
    <section id="skills" style={{ padding: "80px 32px", maxWidth: 780, margin: "0 auto" }}>
      <Reveal type="reveal-up">
        <div style={{ marginBottom: 48 }}>
          <div style={{ fontSize: 12, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--text-muted)", marginBottom: 12 }}>What I work with</div>
          <h2 style={{ fontSize: "clamp(28px, 4vw, 40px)", fontWeight: 600, letterSpacing: "-0.025em" }}>
            Skills
          </h2>
        </div>
      </Reveal>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: 24 }}>
        {SKILLS.map((group, gi) => (
          <Reveal key={group.group} type="reveal-spring" delay={gi * 100}>
            <div style={{ padding: "24px 28px", borderRadius: 16, border: "1px solid var(--border)", background: "white" }}>
              <div style={{ fontSize: 12, fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", color: "var(--text-muted)", marginBottom: 16 }}>
                {group.group}
              </div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {group.items.map((item, ii) => (
                  <SkillChip key={item} item={item} gi={gi} ii={ii} />
                ))}
              </div>
            </div>
          </Reveal>
        ))}
      </div>

      {/* Currently learning callout */}
      <Reveal type="reveal-fade" delay={300}>
        <div style={{ marginTop: 24, padding: "20px 28px", borderRadius: "var(--radius)", background: accentLight, border: `1px solid ${accent}22`, display: "flex", gap: 16, alignItems: "flex-start" }}>
          <div style={{ width: 8, height: 8, borderRadius: "50%", background: accent, flexShrink: 0, marginTop: 6 }}></div>
          <div>
            <div style={{ fontSize: 14, fontWeight: 600, color: accent, marginBottom: 4 }}>Currently learning</div>
            <div style={{ fontSize: 14, color: "var(--text-muted)" }}>React, Node.js, and TypeScript — building toward full-stack fluency while maintaining a desktop-first approach with Tauri.</div>
          </div>
        </div>
      </Reveal>
    </section>
  );
}

/* ─── Timeline / Experience ─── */
function Timeline({ tweaks }) {
  const accent = tweaks.accentColor === "blue" ? "var(--blue)" : tweaks.accentColor === "green" ? "oklch(52% 0.18 150)" : "oklch(55% 0.2 30)";

  const items = [
    { year: "Now", title: "Catalyst — in development", org: "Desktop App", desc: "Building a Tauri-powered video downloader wrapping yt-dlp. Alpha versions available. Actively developing new features." },
    { year: "Nov 2025", title: "Spotify Fullscreen Mode", org: "Chrome Extension", desc: "Published a Chrome extension that surfaces a beautiful fullscreen music interface. First publicly shipped product." },
    { year: "Jun 2025", title: "monsterprod.fr", org: "Website", desc: "Built the full site for monsterprod.fr — hand-crafted HTML, CSS and JavaScript, no frameworks." },
    { year: "Mar 2025", title: "ShortLink", org: "Website", desc: "Built a simple URL shortening service with a clean, modern interface." },
    { year: "July 2023", title: "Two years in France", org: "French immersion", desc: "Left New Zealand in July 2023, returned September 2025. Became fully fluent in French while continuing to code and shoot photography." },
    { year: "2023", title: "First real projects", org: "JS + Python", desc: "Started building proper web apps — JavaScript frontends backed by Python servers. Things started clicking." },
    { year: "2020", title: "Started coding", org: "Python → HTML & CSS", desc: "Picked up Python at age 10, then quickly moved into HTML and CSS. Fell in love with building things on a screen." },
  ];

  return (
    <section id="experience" style={{ padding: "80px 32px", maxWidth: 780, margin: "0 auto" }}>
      <Reveal type="reveal-up">
        <div style={{ marginBottom: 48 }}>
          <div style={{ fontSize: 12, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--text-muted)", marginBottom: 12 }}>Journey</div>
          <h2 style={{ fontSize: "clamp(28px, 4vw, 40px)", fontWeight: 600, letterSpacing: "-0.025em" }}>
            Timeline
          </h2>
        </div>
      </Reveal>
      <div style={{ position: "relative" }}>
        {/* Vertical line */}
        <div style={{ position: "absolute", left: 84, top: 0, bottom: 0, width: 1, background: "var(--border)" }}></div>
        <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
          {items.map((item, i) => (
            <Reveal key={i} type="reveal-left" delay={i * 90}>
              <div style={{ display: "flex", gap: 0, paddingBottom: 40 }}>
                {/* Year column */}
                <div style={{ width: 80, flexShrink: 0, paddingRight: 16 }}>

                </div>
                {/* Dot */}
                <div style={{ position: "relative", flexShrink: 0, marginRight: 24 }}>
                  <div style={{ width: 10, height: 10, borderRadius: "50%", background: i === 0 ? accent : "var(--border)", border: `2px solid ${i === 0 ? accent : "var(--border)"}`, marginTop: 4, boxShadow: i === 0 ? `0 0 0 4px ${accent}22` : "none" }}></div>
                </div>
                {/* Content */}
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 11.5, fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase", color: "var(--text-muted)", marginBottom: 4 }}>{item.org}</div>
                  <div style={{ fontSize: 16, fontWeight: 600, color: "var(--text)", marginBottom: 6 }}>{item.title}</div>
                  <div style={{ fontSize: 14.5, color: "var(--text-muted)", lineHeight: 1.65 }}>{item.desc}</div>

/* ─── App ─── */
function App() {

  return (

        <Hero tweaks={tweaks} />

      <TweaksPanel>
